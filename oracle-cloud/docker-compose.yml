version: '3.8'

services:
  backend:
    image: portfolio-wesley-backend:latest
    container_name: portfolio-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 850M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
