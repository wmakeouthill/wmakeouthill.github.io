# Compose para o modo SSR/edge (front + API servidos pelo Oracle).
# Porta 8080 exposta apenas em localhost — tráfego público entra via Caddy (:443).
# Rollback: SSR_ENABLED=false ou volte para docker-compose.yml (API-only).
services:
  backend:
    image: portfolio-wesley-ssr:latest
    container_name: portfolio-ssr
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/google-service-account.json
      FRONTEND_ENABLED: "true"
      SSR_ENABLED: "true"
      SSR_BYPASS: "false"
      NODE_SSR_PORT: "4000"
      SSR_RENDERER_URL: "http://127.0.0.1:4000"
      SSR_API_BASE_URL: "http://127.0.0.1:8080"
      PUBLIC_SITE_BASE_URL: "${PUBLIC_SITE_BASE_URL:-https://wmakeouthill.dev}"
      SSR_WARMUP_ENABLED: "true"
      EDGE_WARMUP_ENABLED: "true"
    volumes:
      - ./secrets/google-service-account.json:/run/secrets/google-service-account.json:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/api/health && wget --spider -q http://localhost:4000/favicon.ico"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          # VM Always Free ~1 GB: sobra RAM para Caddy + SO (~100 MB).
          memory: 920M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
