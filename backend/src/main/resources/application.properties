# ===================================
# AI Provider Configuration
# ===================================
# Ambos os adapters (Gemini e OpenAI) são carregados simultaneamente.
# O AIChatRouter roteia para o adapter correto baseado no modelo solicitado.
# Gemini é usado como padrão (mais rápido), OpenAI como alternativa.

# Gemini via Vertex AI (Primário)
# Autenticação: JSON externo apontado por GOOGLE_APPLICATION_CREDENTIALS
vertex.ai.enabled=${VERTEX_AI_ENABLED:true}
vertex.ai.project-id=${VERTEX_AI_PROJECT_ID:}
vertex.ai.location=${VERTEX_AI_LOCATION:global}
gemini.model=gemini-3.1-flash-lite
gemini.models.fallback=gemini-2.5-flash
gemini.max-tokens=8192
gemini.tts.model=gemini-2.5-flash-tts
gemini.tts.voice=Puck

# OpenAI / ChatGPT (Fallback)
# Tenta ler da variável de ambiente primeiro, depois do configmap-local.properties
openai.api.key=${OPENAI_API_KEY:}
openai.api.url=https://api.openai.com/v1/chat/completions
openai.model=gpt-4o-mini
# Fallbacks ordenados por capacidade
openai.models.fallback=gpt-3.5-turbo
openai.max-tokens=4000

# Frontend static path (usado por WebConfig e SpaController)
# Agora apontando para o build Angular do portfólio (pasta browser)
frontend.path=../frontend/dist/portfolio/browser

# Desabilitar frontend embutido no backend (usar Vercel para frontend)
# Isso faz o backend retornar 404 para requisições não-API, reduzindo o tamanho do JAR
# e acelerando o cold start no Cloud Run
frontend.enabled=${FRONTEND_ENABLED:false}

# Server
server.port=8080
spring.main.banner-mode=off

# Tomcat — pool enxuto para VM de baixa RAM. Cada thread reserva stack; o portfolio
# tem trafego baixo, entao 50 threads sobra e reduz a RAM reservada (default e 200).
server.tomcat.threads.max=${TOMCAT_MAX_THREADS:50}
server.tomcat.threads.min-spare=5
server.tomcat.accept-count=50

# Upload multimodal do chat (áudio/vídeo/documentos enviados ao Gemini inline)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB

# Email Configuration (Gmail SMTP)
# Credenciais devem vir de variáveis de ambiente ou configmap-secrets-local.properties
# NUNCA coloque credenciais reais neste arquivo!
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:}
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email Recipient (pode ser diferente do username se necessário)
email.recipient=${EMAIL_RECIPIENT:}
email.from=${EMAIL_FROM:${GMAIL_USERNAME:}}

# Logging
logging.level.root=INFO
logging.level.com.snackbar=DEBUG

# GitHub API Configuration
# Token pode vir de variável de ambiente GITHUB_API_TOKEN, GITHUB_TOKEN, GH_TOKEN
# ou da propriedade github.api.token no configmap-secrets-local.properties
github.api.username=${GITHUB_USERNAME:wmakeouthill}
github.api.token=${GITHUB_API_TOKEN:${GITHUB_TOKEN:${GH_TOKEN:}}}

# Use Ant path matcher to allow complex patterns like /**/{path:...}
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# ===================================
# SSR / SEO / Cache em memória (Caffeine)
# ===================================
# Edge / SSR
ssr.enabled=${SSR_ENABLED:false}
ssr.bypass=${SSR_BYPASS:false}
ssr.renderer.url=${SSR_RENDERER_URL:http://127.0.0.1:4000}
ssr.renderer.timeout-seconds=${SSR_RENDERER_TIMEOUT:5}
public.site.base-url=${PUBLIC_SITE_BASE_URL:https://wmakeouthill.dev}

# HTML cache (paginas SSR)
ssr.cache.html.ttl-seconds=900
ssr.cache.html.stale-seconds=86400
ssr.cache.html.max-entries=500
ssr.cache.lock-wait-seconds=2

# Data / markdown / mermaid cache
ssr.cache.data.ttl-seconds=300
ssr.cache.data.stale-seconds=3600
ssr.cache.data.max-entries=500
ssr.cache.markdown.ttl-seconds=21600
ssr.cache.markdown.max-entries=200
ssr.cache.mermaid.ttl-seconds=86400
ssr.cache.mermaid.max-entries=500

# Warmup
ssr.cache.warmup.enabled=${SSR_WARMUP_ENABLED:true}
ssr.cache.warmup.top-projects=20

# ===================================
# Edge cache warmup (Vercel)
# ===================================
# O backend (sempre ligado) pinga as rotas publicas da Vercel periodicamente
# para manter o edge cache populado. Sem isso, rotas sem trafego caem do cache
# e o proximo acesso paga o render frio (~9s: cold start SSR + proxies + backend).
edge.warmup.enabled=${EDGE_WARMUP_ENABLED:true}
# use-sitemap=true: aquece TODAS as paginas de projeto (pt + /en), cobrindo o
# que o Googlebot rastreia. Em falha/vazio cai na lista estatica abaixo.
edge.warmup.use-sitemap=${EDGE_WARMUP_USE_SITEMAP:true}
edge.warmup.routes=${EDGE_WARMUP_ROUTES:/,/en,/projects,/en/projects}
edge.warmup.interval-ms=${EDGE_WARMUP_INTERVAL_MS:300000}
edge.warmup.initial-delay-ms=${EDGE_WARMUP_INITIAL_DELAY_MS:60000}

# ===================================
# API Key Authentication (Oracle Cloud / produção)
# ===================================
# Quando definido, todas as requisições /api/** devem incluir header:
#   X-API-Key: <valor da API_KEY>
# Se vazio/ausente, o filtro é desativado (modo desenvolvimento local)
api.key=${API_KEY:}

