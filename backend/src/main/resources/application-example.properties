# ===========================
# 🌐 Application (exemplo)
# ===========================
#
# Este arquivo é um EXEMPLO de configuração.
# NÃO use secrets reais aqui. Para chaves sensíveis, use:
# - Variáveis de ambiente
# - Arquivo container/configmap-local.properties (local)
#
# Copie o conteúdo que precisar para application.properties
# ou para um arquivo de configuração separado no ambiente alvo.

# ---------------------------
# Backend HTTP
# ---------------------------
server.port=8080
spring.main.banner-mode=off

# Logging padrão
logging.level.root=INFO
logging.level.com.snackbar=DEBUG

# Usado pelo SpaController para localizar o build Angular
# (o Maven já copia o frontend para esta pasta)
frontend.path=../frontend/dist/portfolio/browser

# ---------------------------
# OpenAI / ChatGPT (exemplo)
# ---------------------------
# Por padrão, lê da variável de ambiente OPENAI_API_KEY.
# Você pode sobrescrever via configmap-local.properties.
openai.api.key=${OPENAI_API_KEY:}
openai.api.url=https://api.openai.com/v1/chat/completions
openai.model=gpt-5-mini
# Modelos de fallback (separados por vírgula) - tentados em sequência quando o modelo principal falha
# Ordenados por capacidade de tokens: maior TPM primeiro para melhor performance
# Exemplo: gpt-5.1,gpt-4.1-nano,gpt-4o-mini,gpt-3.5-turbo
openai.models.fallback=gpt-5.1,gpt-4.1-nano,gpt-4o-mini,gpt-3.5-turbo
openai.max-tokens=4000

# ---------------------------
# GitHub API (exemplo)
# ---------------------------
# Token de acesso pessoal (PAT) com permissão somente leitura.
# NUNCA commitar token real. Use variável de ambiente GITHUB_API_TOKEN
# ou configure em configmap-local.properties.
github.api.base-url=https://api.github.com
github.api.username=wmakeouthill
github.api.token=${GITHUB_API_TOKEN:}

# ---------------------------
# E-mail (Spring Mail + Gmail) - exemplo
# ---------------------------
# Configuração típica para enviar e-mails via Gmail.
# Use sempre senha de app, NUNCA sua senha pessoal.
# Defina as credenciais via variáveis de ambiente:
#   PORTFOLIO_MAIL_USERNAME, PORTFOLIO_MAIL_PASSWORD

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${PORTFOLIO_MAIL_USERNAME:}
spring.mail.password=${PORTFOLIO_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# E-mail de destino principal para receber mensagens do formulário de contato.
portfolio.mail.to=seu-email-principal@example.com

# Remetente padrão usado nas mensagens do portfólio.
portfolio.mail.from=${PORTFOLIO_MAIL_USERNAME:no-reply@portfolio-wesley.dev}

# ---------------------------
# SSR / SEO / Cache em memória (Caffeine) - exemplo
# ---------------------------
# Liga o SSR (Spring edge + Node renderer). Mantenha false até a Fase 5 estar pronta.
ssr.enabled=${SSR_ENABLED:false}
# Rollback de emergência: true volta a servir o SPA estático.
ssr.bypass=${SSR_BYPASS:false}
# Endpoint do renderizador Angular SSR (processo Node sidecar).
ssr.renderer.url=${SSR_RENDERER_URL:http://127.0.0.1:4000/render}
ssr.renderer.timeout-seconds=${SSR_RENDERER_TIMEOUT:5}
# Domínio público canônico (canonical/hreflang/OG/sitemap).
public.site.base-url=${PUBLIC_SITE_BASE_URL:https://seu-dominio.com.br}

# Cache de HTML (paginas SSR)
ssr.cache.html.ttl-seconds=900
ssr.cache.html.stale-seconds=86400
ssr.cache.html.max-entries=500
ssr.cache.lock-wait-seconds=2

# Cache de data / markdown / mermaid
ssr.cache.data.ttl-seconds=300
ssr.cache.data.stale-seconds=3600
ssr.cache.data.max-entries=500
ssr.cache.markdown.ttl-seconds=21600
ssr.cache.markdown.max-entries=200
ssr.cache.mermaid.ttl-seconds=86400
ssr.cache.mermaid.max-entries=500

# Warmup de cache no startup
ssr.cache.warmup.enabled=${SSR_WARMUP_ENABLED:true}
ssr.cache.warmup.top-projects=20


