<div class="bg-fx" aria-hidden="true">
  <div class="bg-grad"></div>
  <div class="bg-stars"></div>
</div>

<app-header></app-header>

<router-outlet />

<app-footer></app-footer>

<!-- Scroll to Top Button -->
<button 
  class="scroll-to-top" 
  [class.visible]="showScrollToTop()"
  (click)="scrollToTop()" 
  aria-label="Scroll to top"
>
  ↑
</button>

<!-- Widget de chat com IA sobre o Wesley — carregado em idle, fora do caminho
     crítico. É interativo só no browser, então não precisa entrar no main.js
     nem no HTML do SSR; o @defer gera um chunk próprio (corta o JS não usado no
     load). É position:fixed, então o placeholder vazio não causa CLS. -->
@defer (on idle) {
  <app-chat-widget [scrollToTopVisible]="showScrollToTop()"></app-chat-widget>
}
