@if (isOpen()) {
<div class="modal-backdrop open readme-backdrop" (click)="closeModal()" (keydown)="onKeyDown($event)">
  <div class="modal readme-modal" role="dialog" aria-modal="true" aria-label="Leitor de README" (click)="$event.stopPropagation()" (keydown)="onKeyDown($event)">
    <div class="modal-head">
      <div>
        <h3>{{ projectName() }} - README</h3>
        <div class="sub">github.com/wmakeouthill</div>
      </div>
      <div class="md-toolbar modal-controls">
        <button (click)="decreaseZoom()" title="Diminuir zoom">
          -
        </button>
        <span class="md-zoom zoom-level">{{ zoomDisplay() }}</span>
        <button (click)="increaseZoom()" title="Aumentar zoom">
          +
        </button>
        <button class="modal-close close-btn" (click)="closeModal()" title="Fechar modal">
          &#10005;
        </button>
      </div>
    </div>
    <div class="modal-body" (keydown)="onKeyDown($event)">
      <div class="markdown-container" (wheel)="onMouseWheel($event)">
        @if (loadingReadme()) {
          <div class="loading-readme">
            <div class="spinner"></div>
            <p>Carregando README...</p>
          </div>
        } @else if (hasContent()) {
          <div #markdownContent class="markdown-content md-content" [innerHTML]="readmeContent()"></div>
        } @else {
          <div class="no-readme">
            <p>README nao encontrado para este projeto.</p>
          </div>
        }
      </div>
    </div>
  </div>
</div>
}
