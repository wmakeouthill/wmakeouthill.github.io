<div class="chat-widget-container" [class.scroll-top-visible]="scrollToTopVisible()">
  <app-chat-floating-button [isOpen]="isOpen()" [unreadCount]="unreadCount()" (onClick)="toggleOpen()" />

  @if (isOpen()) {
  <section class="chat-panel" aria-label="Chat com IA sobre o Wesley">
    <app-chat-header [audioResponseEnabled]="audioResponseEnabled()" (onToggleAudioResponse)="toggleAudioResponse()"
      (onClose)="toggleOpen()" />

    <div class="chat-messages" role="log" #messagesContainer>
      @for (message of messages(); track message.timestamp) {
      <app-chat-message [message]="message" />
      }

      @if (isLoading()) {
      <app-chat-loading />
      }
    </div>

    @if (shouldShowSuggestions()) {
      <div class="chat-suggest">
        @for (suggestion of suggestions(); track suggestion) {
          <button type="button" (click)="sendSuggestedMessage(suggestion)">{{ suggestion }}</button>
        }
      </div>
    }

    <app-chat-input [isLoading]="isLoading()" [inputText]="inputText()" [canSend]="canSend()" [shouldFocus]="isOpen()"
      [attachments]="pendingAttachments()" (onInputChange)="handleInputChange($event)"
      (onSend)="sendMessage()" (onCancel)="cancelarMensagem()" (onAttach)="handleAttach($event)"
      (onRemoveAttachment)="handleRemoveAttachment($event)" />
  </section>
  }
</div>
