<div class="chat-input-wrapper">
  @if (attachments().length > 0) {
  <div class="chat-attachments">
    @for (file of attachments(); track $index) {
    <div class="chat-attachment-chip">
      <span class="chat-attachment-name" [title]="file.name">{{ file.name }}</span>
      <button type="button" class="chat-attachment-remove" (click)="removeAttachment($index)"
        aria-label="Remover anexo">×</button>
    </div>
    }
  </div>
  }

  <form class="chat-input-area" (ngSubmit)="handleSubmit()" autocomplete="off">
    <input #fileInput type="file" multiple [accept]="acceptTypes" (change)="handleFilesSelected($event)" hidden />

    <button type="button" class="chat-icon-button" (click)="openFilePicker()" [disabled]="isLoading()"
      aria-label="Anexar arquivo" title="Anexar arquivo (imagem, PDF, áudio, Word, Excel, PowerPoint, texto)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" />
      </svg>
    </button>

    <button type="button" class="chat-icon-button" [class.recording]="isRecording()" (click)="toggleRecording()"
      [disabled]="isLoading()" [attr.aria-label]="isRecording() ? 'Parar gravação' : 'Gravar áudio'"
      [title]="isRecording() ? 'Parar gravação' : 'Gravar áudio'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
        <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
        <line x1="12" y1="19" x2="12" y2="23" />
      </svg>
    </button>

    <textarea #chatInput class="chat-input" [ngModel]="inputText()"
      (ngModelChange)="handleInputChange($event)" (keydown)="handleKeydown($event)" name="chatInput" autocomplete="off"
      [placeholder]="'chat.placeholder' | translate" rows="1"></textarea>

  <!-- Model Selector Dropdown - GitHub Copilot Style -->
  <div class="model-selector">
    <button type="button" class="model-selector-button" (click)="toggleDropdown()" [disabled]="isLoading()">
      <span class="model-name">{{ getModelName() }}</span>
      <span class="dropdown-arrow">▾</span>
    </button>

    @if (isDropdownOpen()) {
    <div class="model-dropdown">
      @for (model of models; track model.id) {
      <button type="button" class="model-option" [class.selected]="selectedModel() === model.id"
        (click)="selectModel(model.id)">
        <span class="model-option-name">
          {{ model.name }}
          @if (model.id === 'gemini') {
          <span class="model-recommended">(Recomendado)</span>
          }
        </span>
        @if (selectedModel() === model.id) {
        <span class="model-check">✓</span>
        }
      </button>
      }
    </div>
    }
  </div>

  <button type="button" class="chat-new-conversation-button" (click)="iniciarNovaConversa()" [disabled]="isLoading()"
    [aria-label]="'chat.newChat' | translate" [attr.data-tooltip]="'chat.newChat' | translate">
    <img src="/new_conversation.png" [alt]="'chat.newChat' | translate" class="new-conversation-icon" />
  </button>
  @if (isLoading()) {
    <button type="button" class="chat-send-button chat-stop-button" (click)="handleCancel()"
      [attr.aria-label]="'chat.stop' | translate" [title]="'chat.stop' | translate">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <rect x="6" y="6" width="12" height="12" rx="2" />
      </svg>
    </button>
  } @else {
    <button type="submit" class="chat-send-button" [disabled]="!canSend()">
      {{ 'chat.send' | translate }}
    </button>
  }
  </form>
</div>
