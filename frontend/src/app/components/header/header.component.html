<nav class="top" [class.scrolled]="isScrolled()">
  <div class="nav-inner">
    <a href="#hero" (click)="scrollToSection('hero', $event)" class="brand">
      <span class="logo">
        <svg viewBox="0 0 40 40" aria-hidden="true">
          <defs>
            <linearGradient id="wcgN" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#0a4f8f" />
              <stop offset="1" stop-color="#002E59" />
            </linearGradient>
          </defs>
          <rect x="1.5" y="1.5" width="37" height="37" rx="11" fill="url(#wcgN)" stroke="#DBC27D" stroke-width="1.5" />
          <polyline class="wc-stroke" points="9,13 14,28 20,18 26,28 31,13" fill="none" stroke="#DBC27D" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" />
          <circle cx="20" cy="13.5" r="1.7" fill="#DBC27D" />
        </svg>
      </span>
      <span>Wesley Correia</span>
    </a>

    <div class="nav-links">
      @for (item of navItems; track item.section) {
        @if (item.section !== 'hero') {
          <a [href]="'#' + item.section" (click)="scrollToSection(item.section, $event)" [class.active]="activeSection() === item.section">
            {{ item.labelKey | translate }}
          </a>
        }
      }
    </div>

    <div class="nav-right">
      <a href="#contact" (click)="scrollToSection('contact', $event)" class="btn btn-accent nav-cta">Vamos conversar</a>
      <button class="nav-toggle" (click)="toggleMobileMenu()" aria-label="Menu">☰</button>
    </div>
  </div>

  @if (isMobileMenuOpen()) {
    <div class="mobile-menu prototype-mobile-menu">
      @for (item of navItems; track item.section) {
        @if (item.section !== 'hero') {
          <a [href]="'#' + item.section" (click)="scrollToSection(item.section, $event)" [class.active]="activeSection() === item.section">
            {{ item.labelKey | translate }}
          </a>
        }
      }
    </div>
  }
</nav>
